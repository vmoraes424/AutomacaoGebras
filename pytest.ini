[pytest]
testpaths = tests
python_files = test_*.py
norecursedirs = .git .pytest_cache __pycache__ contratos runtime
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    integration: testes que chamam APIs externas (desligados por padrão)
    hub_mysql: INSERT real no MySQL gebras (RUN_HUB_MYSQL=1, staging/manual)
    automation_regression: regressao da automacao pos-formulario web
